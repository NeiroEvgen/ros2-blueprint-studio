name: ArmControllerNode
type: ros.cpp.CppCustomNode
properties:
  parent_group_id: ''
  group_uid: ''
  container_group: main
  is_imported: false
  source_file: ArmControllerNode.cpp
  code_content: "#include \"rclcpp/rclcpp.hpp\"\n#include \"std_msgs/msg/float64_multi_array.hpp\"\
    \n#include <cmath>\n#include <algorithm>\n#include <chrono>\n\nusing namespace\
    \ std::chrono_literals;\n\n// \u041C\u0430\u043F\u043F\u0438\u043D\u0433 \u043F\
    \u043E\u0437\u044B \u0440\u0443\u043A\u0438 (\u0441 \u043A\u0430\u043C\u0435\u0440\
    \u044B) \u0432 \u0443\u0433\u043B\u044B \u0441\u0443\u0441\u0442\u0430\u0432\u043E\
    \u0432 \u043C\u0430\u043D\u0438\u043F\u0443\u043B\u044F\u0442\u043E\u0440\u0430\
    .\n// \u0412\u0445\u043E\u0434:  /hand/pose  Float64MultiArray data[4]:\n//  \
    \      [0] x \u0437\u0430\u043F\u044F\u0441\u0442\u044C\u044F \u0432 \u043A\u0430\
    \u0434\u0440\u0435 0..1, [1] y \u0432 \u043A\u0430\u0434\u0440\u0435 0..1 (0 =\
    \ \u0432\u0435\u0440\u0445),\n//        [2] tilt \u043A\u0438\u0441\u0442\u0438\
    \ (\u0440\u0430\u0434, 0 = \u0432\u0435\u0440\u0442\u0438\u043A\u0430\u043B\u044C\
    \u043D\u043E \u0432\u0432\u0435\u0440\u0445), [3] grip 0..1\n// \u0412\u044B\u0445\
    \u043E\u0434: /arm/joint_cmd Float64MultiArray data[6] (\u043A\u043E\u043D\u0442\
    \u0440\u0430\u043A\u0442 ArmRenderNode)\nclass ArmControllerNode : public rclcpp::Node\
    \ {\npublic:\n    ArmControllerNode() : Node(\"arm_controller_node\") {\n    \
    \    // \u0426\u0435\u043B\u0435\u0432\u044B\u0435 \u0438 \u0442\u0435\u043A\u0443\
    \u0449\u0438\u0435 (\u0441\u0433\u043B\u0430\u0436\u0435\u043D\u043D\u044B\u0435\
    ) \u0443\u0433\u043B\u044B; \u0441\u0442\u0430\u0440\u0442 = \u043F\u043E\u0437\
    \u0430 \u043E\u0436\u0438\u0434\u0430\u043D\u0438\u044F\n        target_ = idle_\
    \ = {0.0, 1.10, -0.60, 0.0, 0.0, 0.5};\n        smooth_ = {0.0, 2.60, 0.20, 0.0,\
    \ 0.0, 0.5};   // \u0438\u0437 \u0441\u043B\u043E\u0436\u0435\u043D\u043D\u043E\
    \u0439\n        last_hand_time_ = now();\n\n        sub_ = create_subscription<std_msgs::msg::Float64MultiArray>(\n\
    \            \"/hand/pose\", 10,\n            [this](const std_msgs::msg::Float64MultiArray::SharedPtr\
    \ msg) {\n                if (msg->data.size() < 4) return;\n                double\
    \ x = std::clamp(msg->data[0], 0.0, 1.0);\n                double y = std::clamp(msg->data[1],\
    \ 0.0, 1.0);\n                double tilt = std::clamp(msg->data[2], -1.2, 1.2);\n\
    \                double grip = std::clamp(msg->data[3], 0.0, 1.0);\n\n       \
    \         // --- \u041C\u0430\u043F\u043F\u0438\u043D\u0433 \u043A\u0430\u0434\
    \u0440 -> \u0441\u0443\u0441\u0442\u0430\u0432\u044B ---\n                target_[0]\
    \ = (x - 0.5) * 1.6;            // yaw \u0431\u0430\u0437\u044B\n            \
    \    double lift = 1.0 - y;                    // \u0432\u044B\u0448\u0435 \u0440\
    \u0443\u043A\u0430 = \u0432\u044B\u0448\u0435 \u043C\u0430\u043D\u0438\u043F\u0443\
    \u043B\u044F\u0442\u043E\u0440\n                target_[1] = 1.60 - 1.10 * lift;\
    \          // \u043F\u043B\u0435\u0447\u043E\n                target_[2] = -0.20\
    \ - 0.75 * lift;         // \u043B\u043E\u043A\u043E\u0442\u044C\n           \
    \     target_[3] = tilt;                        // \u043A\u0438\u0441\u0442\u044C\
    \ \u043F\u043E\u0432\u0442\u043E\u0440\u044F\u0435\u0442 \u043D\u0430\u043A\u043B\
    \u043E\u043D\n                target_[5] = grip;\n\n                last_hand_time_\
    \ = now();\n            });\n\n        pub_ = create_publisher<std_msgs::msg::Float64MultiArray>(\"\
    /arm/joint_cmd\", 10);\n        timer_ = create_wall_timer(33ms, std::bind(&ArmControllerNode::update,\
    \ this));\n        RCLCPP_INFO(get_logger(),\n            \"\U0001F3AE ArmControllerNode:\
    \ /hand/pose -> /arm/joint_cmd (EMA, failsafe)\");\n    }\n\nprivate:\n    void\
    \ update() {\n        // Failsafe: \u0440\u0443\u043A\u0430 \u043F\u0440\u043E\
    \u043F\u0430\u043B\u0430 \u0438\u0437 \u043A\u0430\u0434\u0440\u0430 -> \u043F\
    \u043B\u044B\u0432\u0451\u043C \u0432 \u043F\u043E\u0437\u0443 \u043E\u0436\u0438\
    \u0434\u0430\u043D\u0438\u044F\n        bool hand_alive = (now() - last_hand_time_).seconds()\
    \ < 0.5;\n        const auto& goal = hand_alive ? target_ : idle_;\n\n       \
    \ // EMA-\u0441\u0433\u043B\u0430\u0436\u0438\u0432\u0430\u043D\u0438\u0435: \u0447\
    \u0435\u043C \u043C\u0435\u043D\u044C\u0448\u0435 alpha, \u0442\u0435\u043C \u043F\
    \u043B\u0430\u0432\u043D\u0435\u0435 (\u0438 \u043B\u0435\u043D\u0438\u0432\u0435\
    \u0435)\n        const double alpha = hand_alive ? 0.25 : 0.06;\n        for (size_t\
    \ i = 0; i < smooth_.size(); i++)\n            smooth_[i] += alpha * (goal[i]\
    \ - smooth_[i]);\n\n        std_msgs::msg::Float64MultiArray out;\n        out.data.assign(smooth_.begin(),\
    \ smooth_.end());\n        pub_->publish(out);\n    }\n\n    std::array<double,\
    \ 6> target_, smooth_, idle_;\n    rclcpp::Time last_hand_time_;\n    rclcpp::Subscription<std_msgs::msg::Float64MultiArray>::SharedPtr\
    \ sub_;\n    rclcpp::Publisher<std_msgs::msg::Float64MultiArray>::SharedPtr pub_;\n\
    \    rclcpp::TimerBase::SharedPtr timer_;\n};\n\nint main(int argc, char * argv[])\
    \ {\n    rclcpp::init(argc, argv);\n    rclcpp::spin(std::make_shared<ArmControllerNode>());\n\
    \    rclcpp::shutdown();\n    return 0;\n}"
